version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: retainr
      POSTGRES_PASSWORD: retainr
      POSTGRES_DB: retainr_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retainr -d retainr_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
