#cloud-config
# Runs once on first boot of the Scaleway VPS.
#
# Dokploy manages all application containers + Traefik (replaces Caddy).
# Claude Code does NOT run on this machine — it lives in GitHub Actions.

users:
  - name: ${app_user}
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_pub_key}

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - htop
  - unzip
  - jq
  - postgresql-client

runcmd:
  # App directories (created before Dokploy so paths exist)
  - mkdir -p /opt/retainr/{logs,scripts,data}
  - mkdir -p /opt/retainr/data/{pgdata,umami-pgdata,staging-pgdata,backups}
  - chown -R ${app_user}:${app_user} /opt/retainr

  # Mount additional volume (/dev/sdb) → /opt/retainr/data
  - |
    if [ -b /dev/sdb ]; then
      if ! blkid /dev/sdb; then
        mkfs.ext4 /dev/sdb
      fi
      mount /dev/sdb /opt/retainr/data
      echo "/dev/sdb /opt/retainr/data ext4 defaults,nofail 0 2" >> /etc/fstab
      chown -R ${app_user}:${app_user} /opt/retainr/data
    fi

  # Install Dokploy (includes Docker + Traefik — do NOT install Docker separately)
  # Dokploy starts on port 3000, Traefik on 80/443
  - curl -sSL https://dokploy.com/install.sh | sh

  # Allow app user to use docker
  - usermod -aG docker ${app_user}

  # Crontab: health check (calls GH dispatch) + daily backup
  - |
    (crontab -u ${app_user} -l 2>/dev/null; \
      echo "*/5 * * * * /opt/retainr/scripts/health-check.sh >> /opt/retainr/logs/health.log 2>&1") \
      | crontab -u ${app_user} -
  - |
    (crontab -u ${app_user} -l 2>/dev/null; \
      echo "0 2 * * * /opt/retainr/scripts/backup.sh >> /opt/retainr/logs/backup.log 2>&1") \
      | crontab -u ${app_user} -

final_message: |
  retainr VPS setup complete.
  Dokploy UI: http://<server-ip>:3000 (configure domain via Traefik after first login)
  Next steps:
    1. Open http://<server-ip>:3000 and create admin account
    2. Add GitHub repo as source
    3. Create 'retainr-staging' compose app (staging branch, infra/docker-compose.staging.yml)
    4. Create 'retainr-production' compose app (main branch, infra/docker-compose.prod.yml)
    5. Configure env vars in Dokploy for each app
    6. Get deploy webhook URLs and add to GitHub Actions secrets
    7. Copy /opt/retainr/scripts from repo + add .env with GITHUB_DISPATCH_TOKEN
