version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/platform/db/queries/"
    schema: "internal/platform/migrate/"
    gen:
      go:
        package: "dbq"
        out: "internal/platform/db/dbq"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
