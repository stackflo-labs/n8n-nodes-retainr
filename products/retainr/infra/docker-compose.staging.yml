version: '3.9'

# Staging environment — managed by Dokploy on the `staging` branch.
# Traefik labels tell Dokploy how to route traffic to each service.
# All env vars are injected by Dokploy from the configured environment.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-retainr_staging}
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 128m

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      ENV: staging
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      SCW_ACCESS_KEY: ${SCW_ACCESS_KEY}
      SCW_SECRET_KEY: ${SCW_SECRET_KEY}
      SCW_BUCKET: ${SCW_BUCKET}
      SCW_ENDPOINT: ${SCW_ENDPOINT}
      SCW_REGION: ${SCW_REGION}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-staging.rule=Host(`staging.api.retainr.dev`)"
      - "traefik.http.routers.api-staging.entrypoints=websecure"
      - "traefik.http.routers.api-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.api-staging.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          memory: 192m
        reservations:
          memory: 48m

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: always
    environment:
      ENV: staging
      DATABASE_URL: ${DATABASE_URL}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      SCW_ACCESS_KEY: ${SCW_ACCESS_KEY}
      SCW_SECRET_KEY: ${SCW_SECRET_KEY}
      SCW_BUCKET: ${SCW_BUCKET}
      SCW_ENDPOINT: ${SCW_ENDPOINT}
      SCW_REGION: ${SCW_REGION}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96m
        reservations:
          memory: 24m

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://staging.api.retainr.dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-staging.rule=Host(`staging.retainr.dev`)"
      - "traefik.http.routers.web-staging.entrypoints=websecure"
      - "traefik.http.routers.web-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-staging.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 192m
        reservations:
          memory: 96m

volumes:
  staging_pgdata:
