version: '3.9'

# Production environment — managed by Dokploy on the `main` branch.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-retainr}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /opt/retainr/data/backups:/backups
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      ENV: production
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      SCW_ACCESS_KEY: ${SCW_ACCESS_KEY}
      SCW_SECRET_KEY: ${SCW_SECRET_KEY}
      SCW_BUCKET: ${SCW_BUCKET}
      SCW_ENDPOINT: ${SCW_ENDPOINT}
      SCW_REGION: ${SCW_REGION}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-prod.rule=Host(`api.retainr.dev`)"
      - "traefik.http.routers.api-prod.entrypoints=websecure"
      - "traefik.http.routers.api-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.api-prod.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.retainr.dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-prod.rule=Host(`retainr.dev`) || Host(`www.retainr.dev`)"
      - "traefik.http.routers.web-prod.entrypoints=websecure"
      - "traefik.http.routers.web-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-prod.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  umami_postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami_postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    depends_on:
      umami_postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.umami.rule=Host(`analytics.retainr.dev`)"
      - "traefik.http.routers.umami.entrypoints=websecure"
      - "traefik.http.routers.umami.tls.certresolver=letsencrypt"
      - "traefik.http.services.umami.loadbalancer.server.port=3000"

volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/retainr/data/pgdata
  umami_pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/retainr/data/umami-pgdata
