version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: retainr
      POSTGRES_PASSWORD: retainr
      POSTGRES_DB: retainr_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retainr -d retainr_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
      POSTGRES_DB: umami
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:umami@umami_postgres:5432/umami
      APP_SECRET: dev-secret-change-in-prod
      DISABLE_TELEMETRY: "1"
    ports:
      - "3001:3000"
    depends_on:
      umami_postgres:
        condition: service_healthy

volumes:
  pgdata:
  umami_pgdata:
