name: Production Deploy

# Triggered on every push to main (i.e. after a PR is merged).
# Deploys to production via Dokploy, runs a production smoke check,
# and rolls back + opens an incident issue if health fails.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Trigger Dokploy production deploy
      - name: Trigger Dokploy production deploy
        run: |
          HTTP=$(curl -sf -X POST \
            "${{ secrets.DOKPLOY_PRODUCTION_WEBHOOK }}" \
            -w "%{http_code}" -o /dev/null 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" && "$HTTP" != "201" && "$HTTP" != "204" ]]; then
            echo "Dokploy webhook failed (HTTP $HTTP)"
            exit 1
          fi
          echo "Production deploy triggered (HTTP $HTTP)"

      # Wait for production API to come up — up to 5 minutes
      - name: Wait for production health
        id: health
        run: |
          echo "Polling https://api.retainr.dev/health..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 10 "https://api.retainr.dev/health" \
               | grep -q '"status":"ok"'; then
              echo "✓ Production API healthy after $((i * 10))s"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 10
          done
          echo "✗ Production API did not become healthy"
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      # Verify web is also serving
      - name: Verify production web
        if: steps.health.outputs.healthy == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -sf --max-time 10 "https://retainr.dev" | grep -qi "retainr"; then
              echo "✓ Production web healthy"
              exit 0
            fi
            sleep 5
          done
          echo "✗ Production web not responding"
          exit 1

      # ── Rollback path ──────────────────────────────────────────────────────

      - name: Trigger Dokploy rollback
        if: failure() && steps.health.outputs.healthy == 'false'
        run: |
          echo "Health check failed — triggering Dokploy rollback..."
          curl -sf -X POST "${{ secrets.DOKPLOY_PRODUCTION_ROLLBACK_WEBHOOK }}" || true

      - name: Open incident issue on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Incident] Production deploy failed — ${context.sha.slice(0, 7)}`,
              body: [
                '## Production deploy failure',
                '',
                `- **Commit:** ${context.sha}`,
                `- **Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **Time:** ${new Date().toISOString()}`,
                '',
                '## Immediate actions',
                '- [ ] Check Dokploy dashboard for container logs',
                '- [ ] Verify rollback succeeded: `curl https://api.retainr.dev/health`',
                '- [ ] Identify root cause and fix forward via a new PR',
                '',
                '## Investigation',
                '_Triggered automatically. Dokploy rollback was attempted._',
              ].join('\n'),
              labels: ['incident', 'production'],
            })

  # ── Post-deploy production smoke (lighter than staging e2e) ─────────────────

  smoke:
    name: Production Smoke Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Run only web page checks and API health — no workspace registration in production
      - name: Production smoke (web + API health only)
        env:
          BASE_URL: https://retainr.dev
          API_BASE_URL: https://api.retainr.dev
          SMOKE_WEB_ONLY: "true"    # smoke.spec.ts checks this to skip write operations
        run: pnpm exec playwright test --grep "Web pages|API health" --reporter=github
