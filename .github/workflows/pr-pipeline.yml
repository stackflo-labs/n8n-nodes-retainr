name: PR Pipeline

# Full autonomous delivery pipeline for every PR:
#   ci (parallel: tests | lint | web-build | security-scan)
#   → staging-deploy → e2e → auto-approve+merge → (triggers production-deploy.yml)
#
# Claude-created and Dependabot PRs are auto-merged when all gates pass.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  # Queue staging deploys rather than cancelling — prevents mid-flight kills
  # that leave Dokploy in an undefined state. PRs on the same number cancel
  # each other (same PR, new push supersedes), but different PRs queue.
  group: staging-environment
  cancel-in-progress: false

jobs:
  # ── 1a. Go tests + coverage ──────────────────────────────────────────────────

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: retainr
          POSTGRES_PASSWORD: retainr
          POSTGRES_DB: retainr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENV: test
      DATABASE_URL: postgres://retainr:retainr@localhost:5432/retainr_test?sslmode=disable
      VOYAGE_API_KEY: noop
      STRIPE_SECRET_KEY: sk_test_noop
      STRIPE_WEBHOOK_SECRET: whsec_noop
      RESEND_API_KEY: noop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests with coverage
        working-directory: products/retainr/api
        run: |
          go test ./... -count=1 -race -timeout 120s \
            -coverprofile=coverage.out -covermode=atomic

      - name: Enforce coverage gate (≥ 80%)
        working-directory: products/retainr/api
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if (( $(echo "$TOTAL < 80" | bc -l) )); then
            echo "Coverage ${TOTAL}% is below the 80% threshold"
            exit 1
          fi

  # ── 1b. Go lint + security ────────────────────────────────────────────────────

  lint-go:
    name: Go Lint & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: golangci-lint (includes gosec)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: products/retainr/api
          # gosec enabled — see products/retainr/api/.golangci.yml

  # ── 1c. Web lint + build ─────────────────────────────────────────────────────

  build-web:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install

      - name: Lint
        run: pnpm --filter web lint

      - name: Build (contentlayer + next)
        run: pnpm --filter web build

  # ── 1d. Dependency + container security scan ─────────────────────────────────

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # govulncheck — known Go CVEs
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd products/retainr/api && govulncheck ./... && cd ../../..
          cd products/retainr/worker && govulncheck ./...

      # Trivy filesystem scan — catches secrets, misconfigs, known CVEs in deps
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: npm/pnpm audit
        run: |
          pnpm install
          pnpm audit --audit-level=high

  # ── 2. Staging deploy ────────────────────────────────────────────────────────

  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-go, lint-go, build-web, security-scan]
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Push PR HEAD → staging branch so Dokploy picks it up
      - name: Update staging branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git push origin HEAD:refs/heads/staging --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Trigger Dokploy to pull staging branch + build + deploy
      - name: Trigger Dokploy staging deploy
        run: |
          HTTP=$(curl -sf -X POST \
            "${{ secrets.DOKPLOY_STAGING_WEBHOOK }}" \
            -w "%{http_code}" -o /dev/null 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" && "$HTTP" != "201" && "$HTTP" != "204" ]]; then
            echo "Dokploy webhook failed (HTTP $HTTP)"
            exit 1
          fi
          echo "Dokploy staging deploy triggered (HTTP $HTTP)"

      # Poll staging API health — up to 8 minutes (builds on VPS take time)
      - name: Wait for staging API health
        run: |
          echo "Waiting for https://staging.api.retainr.dev/health..."
          for i in $(seq 1 48); do
            BODY=$(curl -sf --max-time 10 "https://staging.api.retainr.dev/health" 2>/dev/null || true)
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✓ Staging API healthy after $((i * 10))s"
              exit 0
            fi
            echo "  attempt $i/48 — response: ${BODY:-no response}"
            sleep 10
          done
          echo "✗ Staging API did not become healthy within 8 minutes"
          exit 1

      - name: Verify staging web
        run: |
          for i in $(seq 1 18); do
            if curl -sf --max-time 10 "https://staging.retainr.dev" | grep -qi "retainr"; then
              echo "✓ Staging web healthy"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Staging web not responding"
          exit 1

  # ── 3. E2E smoke tests ───────────────────────────────────────────────────────

  e2e:
    name: E2E Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: staging-deploy

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        env:
          BASE_URL: https://staging.retainr.dev
          API_BASE_URL: https://staging.api.retainr.dev
        run: pnpm exec playwright test --reporter=github

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7

      - name: Comment E2E result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ job.status }}' === 'success'
            const icon = passed ? '✅' : '❌'
            const msg = passed
              ? 'All smoke tests passed on staging.'
              : `Smoke tests **failed** — [view report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `${icon} **E2E staging smoke tests**: ${msg}\n\n_[staging.retainr.dev](https://staging.retainr.dev) | [staging.api.retainr.dev](https://staging.api.retainr.dev)_`,
            })

  # ── 4. Auto-approve and merge ────────────────────────────────────────────────

  auto-merge:
    name: Auto Approve & Merge
    runs-on: ubuntu-latest
    needs: [test-go, lint-go, build-web, security-scan, e2e]
    # Auto-merge: Claude-created branches, Dependabot patches/minors, and labeled PRs
    if: |
      success() && (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        startsWith(github.event.pull_request.head.ref, 'auto-fix/') ||
        startsWith(github.event.pull_request.head.ref, 'claude/') ||
        contains(github.event.pull_request.labels.*.name, 'auto-merge')
      )

    steps:
      - name: Approve PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --approve \
            --body "✅ CI green (tests, lint, coverage, security scan), staging deployed, all e2e smoke tests passed. Auto-approving."
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}

      - name: Enable auto-merge (squash)
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
