name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: []  # Add test job name here once tests are stable
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build API binary
        working-directory: apps/api
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o bin/api ./cmd/api

      - name: Build Worker binary
        working-directory: apps/worker
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o bin/worker ./cmd/worker

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner
          chmod 600 ~/.ssh/hetzner
          echo "${{ secrets.HETZNER_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy binaries
        run: |
          scp -i ~/.ssh/hetzner apps/api/bin/api \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/retainr/api.new
          scp -i ~/.ssh/hetzner apps/worker/bin/worker \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/retainr/worker.new

      - name: Swap binaries and restart
        run: |
          ssh -i ~/.ssh/hetzner ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            set -e
            # Atomic swap
            mv /opt/retainr/api /opt/retainr/api.prev || true
            mv /opt/retainr/api.new /opt/retainr/api
            chmod +x /opt/retainr/api

            mv /opt/retainr/worker /opt/retainr/worker.prev || true
            mv /opt/retainr/worker.new /opt/retainr/worker
            chmod +x /opt/retainr/worker

            systemctl restart retainr-api retainr-worker
            sleep 5

            # Health check
            if ! curl -sf https://api.retainr.dev/health; then
              echo "Health check failed — rolling back"
              mv /opt/retainr/api.prev /opt/retainr/api
              mv /opt/retainr/worker.prev /opt/retainr/worker
              systemctl restart retainr-api retainr-worker
              exit 1
            fi
            echo "Deploy successful: ${{ github.sha }}"
          EOF
