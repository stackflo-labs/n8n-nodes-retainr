name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write  # for --provenance SLSA attestation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version already published
        id: version-check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Package version: ${PKG_VERSION}"
          PUBLISHED=$(npm view @stackflo-labs/n8n-nodes-retainr@${PKG_VERSION} version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "Version ${PKG_VERSION} already on npm — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${PKG_VERSION} — publishing"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        if: steps.version-check.outputs.skip == 'false'
        run: npm ci && npm run build

      - name: Debug OIDC context
        if: steps.version-check.outputs.skip == 'false'
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $( [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo yes || echo no )"
          echo "NODE_AUTH_TOKEN set: $( [ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no )"
          cat ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "no .npmrc"

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance --access public

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.version-check.outputs.skip }}" = "true" ]; then
            echo "### ⏭ Skipped — version already on npm" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ Published @stackflo-labs/n8n-nodes-retainr@${{ steps.version-check.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          fi
