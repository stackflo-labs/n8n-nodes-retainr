name: SEO Audit

on:
  pull_request:
    paths:
      - 'products/retainr/web/**'
  push:
    branches: [main]
    paths:
      - 'products/retainr/web/**'

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: products/retainr/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: products/retainr/web
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: products/retainr/web
        run: pnpm build
      - name: Run Lighthouse CI
        working-directory: products/retainr/web
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
