name: Claude Code

# Interactive Claude — responds to @claude mentions in issues and PRs.
# Uses the official anthropics/claude-code-action which runs Claude in a
# controlled, audited GitHub Actions environment — NOT on the production VPS.
#
# Usage examples in issue / PR comments:
#   @claude fix the failing test in apps/api/internal/features/memory/
#   @claude review this PR for security issues
#   @claude implement the feature described in this issue

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    name: Run Claude Code
    runs-on: ubuntu-latest

    # Only run when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (
        contains(github.event.issue.body, '@claude') ||
        github.event.action == 'assigned'
      ))

    permissions:
      contents: write        # push fix branches
      pull-requests: write   # create / comment on PRs
      issues: write          # comment on issues

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Claude can see git log

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 10
            --model claude-sonnet-4-6
